name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    permissions:
       id-token: write
       contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Oryx (SWA's default builder) runt in een apart container en ziet env-vars
      # op de deploy-action niet. Daarom bouwen we hier expliciet met env op
      # step-level, en geven we de al-gebuilde dist/ als app_location mee.
      - name: Build App
        run: npm run build
        env:
          VITE_RAM_API_BASE_URL: ${{ secrets.VITE_RAM_API_BASE_URL }}
          VITE_ENTRA_TENANT_NAME: ${{ secrets.VITE_ENTRA_TENANT_NAME }}
          VITE_ENTRA_CLIENT_ID: ${{ secrets.VITE_ENTRA_CLIENT_ID }}
          VITE_ENTRA_AUTHORITY_URL: ${{ secrets.VITE_ENTRA_AUTHORITY_URL }}
          VITE_ENTRA_USER_FLOW: ${{ secrets.VITE_ENTRA_USER_FLOW }}

      - name: Install OIDC Client from Core Package
        run: npm install @actions/core@1.6.0 @actions/http-client

      - name: Get Id Token
        uses: actions/github-script@v7
        id: idtoken
        with:
           script: |
               const coredemo = require('@actions/core')
               return await coredemo.getIDToken()
           result-encoding: string

      - name: Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ES_BUSINESS_PERFORMANCE }}
          action: "upload"
          ###### Repository/Build Configurations ######
          app_location: "dist"    # al-gebuilde static output
          api_location: ""
          output_location: ""     # niet gebruikt wanneer skip_app_build true is
          skip_app_build: true    # Oryx skippen; we hebben zelf gebouwd
          github_id_token: ${{ steps.idtoken.outputs.result }}
          ###### End of Repository/Build Configurations ######

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          action: "close"
